<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Tarjetas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1 id="titleH1">Tarjetas de productos</h1>
    <div class="cards">
            <div class="card">
                <img class="card__image" src="https://cdn-icons-png.flaticon.com/128/584/584052.png" alt="Icono Software" class="card__image">
                <h2>Precios unicos</h2>
                <p>¡Conoce los increibles precios de nuestros productos y servicios en la pagina!</p>
                <button>Ver Precios</button>
            </div>
            <div class="card SpecialCard">
                <img class="card__image" src="https://cdn-icons-png.flaticon.com/128/18534/18534546.png" alt="Icono Plan 2" class="card__image">
                <h2>Nuevas tecnologias</h2>
                <p>¡Unete y descubre las nuevas tecnologias en investigacion!</p>
                <button>Acceder</button>
            </div>            
            <div class="card">
                <img class="card__image" class="card__image" src="https://cdn-icons-png.flaticon.com/128/15778/15778551.png" alt="Icono Plan 3" class="card__image">
                <h2>Integraciones de IA</h2>
                <p>¡Descubre las posibles aplicaciones de IA en el rubro!</p>
                <button>Saber Mas</button>
            </div>
    </div>
</body>
</html>
